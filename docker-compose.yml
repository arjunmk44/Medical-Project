version: '3.9'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_NAME:-medicalml}
      POSTGRES_USER: ${DB_USER:-medicalml}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-medicalml_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-medicalml}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ml-service:
    build: ./ml-service
    ports:
      - "8001:8001"
    volumes:
      - ./ml-service/models:/app/models
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-medicalml}
      - DB_USER=${DB_USER:-medicalml}
      - DB_PASSWORD=${DB_PASSWORD:-medicalml_pass}
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-medicalml}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-medicalml}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-medicalml_pass}
      ML_SERVICE_URL: http://ml-service:8001
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
